<text x="70" y="70" fill="#111827" font-family="Inter,Arial,Helvetica,sans-serif" font-size="42" font-weight="800" text-anchor="start">ESP32 LED Controller v6 — SN74AHCT125N proper schematic</text>
<text x="70" y="116" fill="#b45309" font-family="Inter,Arial,Helvetica,sans-serif" font-size="29" font-weight="800" text-anchor="start">Answer: pins 10 and 13 go to +5 V, not GND, when channels 3/4 are unused and should be disabled.</text>
<text x="70" y="153" fill="#64748b" font-family="Inter,Arial,Helvetica,sans-serif" font-size="24" font-weight="700" text-anchor="start">Reason: /OE is active-low. LOW/GND enables a buffer; HIGH/+5 V disables output to high-Z.</text>
