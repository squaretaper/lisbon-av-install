<text x="1200.0" y="500.0" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="600" fill="#111" text-anchor="middle"></text>
<text x="1200.0" y="522.0" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="600" fill="#111" text-anchor="middle">1 /OE1 → GND    14 VCC → 5V</text>
<text x="1200.0" y="544.0" font-family="Inter,Arial,sans-serif" font-size="16" font-weight="600" fill="#111" text-anchor="middle">2 1A ← GPIO25   3 1Y → R1/J1</text>
